name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  types:
    name: Types (TypeScript ${{ matrix.typescript }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        typescript: ['5.0', '5.3', '5.6', 'latest']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm install --no-save typescript@${{ matrix.typescript }}
      - run: npm run test:types

  runtime:
    name: Runtime tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:runtime
