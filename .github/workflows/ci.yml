name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  types:
    name: Types (TypeScript ${{ matrix.typescript }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        typescript: ['5.0', '5.3', '5.6', '6.0']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm install --no-save typescript@${{ matrix.typescript }}
      - run: npm run test:types

  runtime:
    name: Runtime tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run test:runtime
